name: Android Build with Buildozer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # We are using 22.04 because 24.04 has library compatibility issues with libffi/libtool
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          # Standard Kivy/Buildozer dependencies plus specific build tools to fix Autoconf/Libtool error
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev m4
          pip3 install --upgrade pip
          pip3 install buildozer Cython==0.29.33 wheel

      - name: Build with Buildozer
        run: |
          # Create buildozer directory and accept all licenses automatically
          mkdir -p .buildozer
          yes | buildozer -v android debug
        env:
          # This helps with potential download/timeout issues
          PYTHONUNBUFFERED: 1

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FrtApp-debug-apk
          path: bin/*.apk

name: KOSTEBEK-AR Build

"on":
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    container: kivy/buildozer:latest

    steps:
      - name: Kodu cek
        uses: actions/checkout@v4

      - name: Tarih bazli versiyon olustur
        run: |
          VERSION=$(date +'%Y.%m.%d')
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          sed -i "s/^version = .*/version = $VERSION/" buildozer.spec
          sed -i "s/APP_VERSION = .*/APP_VERSION = \"$VERSION\"/" main.py

      - name: Buildozer onbellegi
        uses: actions/cache@v4
        with:
          path: /home/user/.buildozer
          key: kivy-docker-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            kivy-docker-

      - name: Android APK derle
        run: buildozer -v android debug

      - name: APK yukle
        uses: actions/upload-artifact@v4
        with:
          name: kostebek-ar-${{ env.APP_VERSION }}.apk
          path: bin/*.apk

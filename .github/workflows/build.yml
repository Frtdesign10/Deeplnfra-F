 name: KOSTEBEK-AR Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

    steps:
      - name: Kodu 횄짠ek
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Tarih bazl횆짹 versiyon olu횇타tur
        run: |
          VERSION=$(date +'%Y.%m.%d')
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Versiyon: $VERSION"
          # buildozer.spec i횄짠indeki versiyonu otomatik g횄쩌ncelle
          sed -i "s/^version = .*/version = $VERSION/" buildozer.spec
          # main.py i횄짠indeki versiyon etiketini g횄쩌ncelle
          sed -i "s/APP_VERSION = .*/APP_VERSION = \"$VERSION\"/" main.py

      - name: Sistem ba횆타횆짹ml횆짹l횆짹klar횆짹n횆짹 kur
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgl1-mesa-dev \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zip \
            unzip \
            openjdk-17-jdk

      - name: pip ba횆타횆짹ml횆짹l횆짹klar횆짹n횆짹 kur
        run: |
          pip install --upgrade pip
          pip install buildozer
          pip install "cython==0.29.37"

      - name: JSON dosyas횆짹n횆짹 kontrol et
        run: |
          if [ -f "kostebek_hatlar.json" ]; then
            echo "kostebek_hatlar.json bulundu"
          else
            echo "UYARI: kostebek_hatlar.json bulunamadi!"
          fi

      - name: Buildozer 횄쨋nbelle횆타i
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-

      - name: Android APK derle
        run: |
          buildozer -v android debug

      - name: APK dosyas횆짹n횆짹 y횄쩌kle
        uses: actions/upload-artifact@v4
        with:
          name: kostebek-ar-${{ env.APP_VERSION }}.apk
          path: bin/*.apk         

name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install cython virtualenv buildozer

      - name: Build with Buildozer
        # 'yes' komutunu daha güvenli bir şekilde boruluyoruz (Broken pipe hatası için)
        run: |
          export BUILDOZER_ALLOW_KIVY_REQS=1
          stdbuf -oL buildozer -v android debug
        env:
          USER: root

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-package
          path: bin/*.apk

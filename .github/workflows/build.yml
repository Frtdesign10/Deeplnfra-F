name: Android Build with Buildozer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev m4
          # Mandatory fix for the macro error:
          sudo ln -s /usr/share/aclocal/libtool.m4 /usr/share/aclocal/ltoptions.m4 || true
          sudo ln -s /usr/share/aclocal/ltsugar.m4 /usr/share/aclocal/ltversion.m4 || true
          pip3 install --upgrade pip
          pip3 install buildozer Cython==0.29.33 wheel

      - name: Build with Buildozer
        run: |
          mkdir -p .buildozer
          # Using "yes |" to skip all license prompts
          yes | buildozer -v android debug
        env:
          PYTHONUNBUFFERED: 1

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FrtApp-debug-apk
          path: bin/*.apk

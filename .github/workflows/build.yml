name: KOSTEBEK-AR Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    container: kivy/buildozer:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        run: |
          VERSION=$(date +'%Y%m%d')
          DISPLAY_VERSION=$(date +'%Y.%m.%d')
          sed -i "s/^android.numeric_version = .*/android.numeric_version = $VERSION/" buildozer.spec
          sed -i "s/APP_VERSION = .*/APP_VERSION = \"$DISPLAY_VERSION\"/" main.py
          echo "APP_VERSION=$DISPLAY_VERSION" >> $GITHUB_ENV

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: /github/home/.buildozer
          key: kivy-v8-${{ hashFiles('buildozer.spec') }}
          restore-keys: kivy-v8-

      - name: Build APK
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kostebek-ar-${{ env.APP_VERSION }}.apk
          path: bin/*.apk

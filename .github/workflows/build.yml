name: KOSTEBEK-AR Build

"on":
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

    steps:
      - name: Kodu cek
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Tarih bazli versiyon olustur
        run: |
          VERSION=$(date +'%Y.%m.%d')
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          sed -i "s/^version = .*/version = $VERSION/" buildozer.spec
          sed -i "s/APP_VERSION = .*/APP_VERSION = \"$VERSION\"/" main.py

      - name: Sistem bagimliliklerini kur
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgl1-mesa-dev \
            libsqlite3-dev \
            autoconf \
            automake \
            libtool \
            lld \
            clang \
            pkg-config \
            zip \
            unzip \
            openjdk-17-jdk

      - name: pip bagimliliklerini kur
        run: |
          pip install --upgrade pip
          pip install "buildozer==1.5.0"
          pip install "cython==0.29.37"
          pip install "python-for-android==2023.09.16"

      - name: Buildozer onbellegi
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-v5-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v5-

      - name: Android APK derle
        run: |
          buildozer -v android debug

      - name: APK yukle
        uses: actions/upload-artifact@v4
        with:
          name: kostebek-ar-${{ env.APP_VERSION }}.apk
          path: bin/*.apk
